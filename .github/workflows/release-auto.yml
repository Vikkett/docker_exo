name: Release Automatique

on:
  push:
    tags:
      - 'v*' # Se déclenche sur v1.0, v2.0.1, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build et Push sur GHCR (comme avant)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}, ghcr.io/${{ github.repository }:latest

      # 2. Création de la Release GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Détails de la version
            - **SHA du commit :** ${{ github.sha }}
            - **Image Docker :** `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            
            Généré automatiquement par GitHub Actions.
          generate_release_notes: true # Génère le changelog automatiquement